# MaintainX Pro — un seul Web Service Node (API + frontend statique)
# Render Dashboard → New → Blueprint → repo GitHub Ilop08/SIAI
services:
  - type: web
    name: maintainx-pro
    env: node
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    buildCommand: |
      cd frontend && npm ci && npm run build
      cd ../backend && npm ci && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
